---
layout: default
---

{% if page.sidebar == null %}
<div class="page">
    <h1 class="page-title">{{ page.title }}</h1>
    {{ content }}
</div>

{% else %}
<div class="row">
    <div class="col-sm-9">
        <div class="page">
            <h1 class="page-title">{{ page.title }}</h1>
            {{ content }}
        </div>
    </div>
    <div class="col-sm-3">
        {{ page.sidebar }}
    </div>
</div>
{% endif %}
