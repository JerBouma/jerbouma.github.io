<script src="https://cdn.jsdelivr.net/npm/instantsearch.js@2.6.0/dist/instantsearch.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.20.1/moment.min.js"></script>
<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/instantsearch.js@2.6.0/dist/instantsearch.min.css">
<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/instantsearch.js@2.6.0/dist/instantsearch-theme-algolia.min.css">

<div id="search-searchbar"></div>

<div id="search-hits-wrapper">
  <div id="search-results-header">
    <span id="search-results-label">Search Results</span>
    <button id="search-results-toggle" aria-expanded="true" aria-label="Collapse search results">
      <i class="fas fa-chevron-up"></i>
    </button>
  </div>
  <div class="post-list" id="search-hits"></div>
</div>

<script>
const search = instantsearch({
  appId: '{{ site.algolia.application_id }}',
  apiKey: '{{ site.algolia.search_only_api_key }}',
  indexName: '{{ site.algolia.index_name }}',
  searchFunction: function (helper) {
    var wrapper = document.getElementById("search-hits-wrapper");

    if (helper.state.query === "") {
      wrapper.style.display = "none";
    } else {
      wrapper.style.display = "";
      // Reset collapse if re-opening
      var hits = document.getElementById('search-hits');
      var btn = document.getElementById('search-results-toggle');
      hits.style.display = '';
      btn.setAttribute('aria-expanded', 'true');
      btn.querySelector('i').className = 'fas fa-chevron-up';
      helper.search();
    }}
  });

const hitTemplate = function(hit) {
  let date = '';
  if (hit.date) {
    date = moment.unix(hit.date).format('MMM D, YYYY');
  }

  let url = `{{ site.baseurl }}${hit.url}#${hit.anchor}`;

  const title = hit.title

  let breadcrumbs = '';
  if (hit._highlightResult.headings) {
    breadcrumbs = hit._highlightResult.headings.map(match => {
      return `<span class="post-breadcrumb">${match.value}</span>`
    }).join(' > ')
  }

  const content = hit._highlightResult.html.value;

  return `
    <div class="post-item">
      <span class="post-meta">${date}</span>
      ${breadcrumbs ? '' : `<a href="${url}" class="post-breadcrumbs">${title}</a>`}
      {{#breadcrumbs}}<a href="${url}" class="post-breadcrumbs">${breadcrumbs}</a>{{/breadcrumbs}}
      <div class="post-snippet">${content}</div>
    </div>
  `;
}


search.addWidget(
  instantsearch.widgets.searchBox({
    container: '#search-searchbar',
    placeholder: 'Search the documentation...',
  })
);

search.addWidget(
  instantsearch.widgets.hits({  
    container: '#search-hits',
    templates: {
      item: hitTemplate
    }
  })
);

search.start();

// Collapse toggle
document.getElementById('search-results-toggle').addEventListener('click', function () {
  const hits = document.getElementById('search-hits');
  const icon = this.querySelector('i');
  const expanded = this.getAttribute('aria-expanded') === 'true';
  hits.style.display = expanded ? 'none' : '';
  this.setAttribute('aria-expanded', String(!expanded));
  icon.className = expanded ? 'fas fa-chevron-down' : 'fas fa-chevron-up';
});

</script>
