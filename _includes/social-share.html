<section class="article-share">
  <span class="article-share__label">Share</span>
  <div class="article-share__buttons">

    <a href="https://bsky.app/intent/compose?text={{ page.title | url_encode }}%20{{ page.url | absolute_url | url_encode }}"
       class="article-share__btn article-share__btn--bluesky"
       onclick="window.open(this.href,'_share','width=600,height=500'); return false;"
       title="Share on Bluesky">
      <i class="fab fa-fw fa-bluesky" aria-hidden="true"></i>
      <span>Bluesky</span>
    </a>

    <a href="https://www.facebook.com/sharer/sharer.php?u={{ page.url | absolute_url | url_encode }}"
       class="article-share__btn article-share__btn--facebook"
       onclick="window.open(this.href,'_share','width=600,height=500'); return false;"
       title="Share on Facebook">
      <i class="fab fa-fw fa-facebook" aria-hidden="true"></i>
      <span>Facebook</span>
    </a>

    <a href="https://www.linkedin.com/shareArticle?mini=true&url={{ page.url | absolute_url | url_encode }}&title={{ page.title | url_encode }}"
       class="article-share__btn article-share__btn--linkedin"
       onclick="window.open(this.href,'_share','width=600,height=500'); return false;"
       title="Share on LinkedIn">
      <i class="fab fa-fw fa-linkedin" aria-hidden="true"></i>
      <span>LinkedIn</span>
    </a>

    <button class="article-share__btn article-share__btn--copy"
            onclick="(function(btn){navigator.clipboard.writeText('{{ page.url | absolute_url }}').then(function(){btn.classList.add('copied');setTimeout(function(){btn.classList.remove('copied');},2000);});})(this)"
            title="Copy link to clipboard">
      <i class="fas fa-fw fa-link" aria-hidden="true"></i>
      <span class="copy-default">Copy link</span>
      <span class="copy-success">Copied!</span>
    </button>

  </div>
</section>
